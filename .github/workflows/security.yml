name: Security Scan

on:
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # npm security audit (frontend)
  npm-audit:
    name: 🔒 npm Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # Go vulnerability check
  govulncheck:
    name: 🔒 Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # CodeQL analysis (TypeScript frontend)
  codeql-web:
    name: 🛡️ CodeQL (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend for CodeQL
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # CodeQL analysis (Go backend)
  codeql-go:
    name: 🛡️ CodeQL (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended,security-and-quality

      - name: Build Go for CodeQL
        run: |
          cd web && npm ci && npm run build && cd ..
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # Weekly SBOM (npm + Go)
  sbom:
    name: 📋 Weekly SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies (npm)
        working-directory: web
        run: npm ci

      - name: Generate npm SBOM
        working-directory: web
        run: |
          DATE=$(date +%Y-%m-%d)
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file ../sbom-npm-${DATE}.json

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate Go SBOM
        run: |
          DATE=$(date +%Y-%m-%d)
          cyclonedx-gomod mod -json -output sbom-go-${DATE}.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom-weekly-${{ github.run_id }}
          path: sbom-*.json
          retention-days: 90
